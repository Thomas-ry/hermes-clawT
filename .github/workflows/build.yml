name: build

on:
  workflow_dispatch: {}
  push:
    branches: [ main ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: astral-sh/setup-uv@v5
        with:
          version: 'latest'

      - name: Install deps
        run: pnpm install

      - name: Build bundled Hermes runtime
        run: pnpm runtime:build

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: pnpm package:mac

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: pnpm package:win

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: pnpm package:linux

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ runner.os }}
          path: apps/desktop/release/**
